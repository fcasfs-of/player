<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCAS_FS - Player - Search Page</title>
  
<link rel="stylesheet" href="theme.css"/>
<link rel="stylesheet" href="theme2.css"/>

  <link rel="icon" href="https://fcasfs-of.cloud-fs.net/player/mdpl.png" type="image/png"/>

 <script src="busc.js"></script>
  
<script>

</script>

<style>

</style>
  
</head>
<body>
   <div class="container">
        <header>
            <div class="logo">
               <img src="https://fcasfs-of.cloud-fs.net/player/mdpl.png"/>
               <h1 id="titlemfpf">Page</h1>
            </div>
            <p class="tagline" id="infotime">Search</p>
        </header>

        <main class="main-content">
            <section class="video-section">
                <div class="video-container">
      <div class="iframe" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
<div id="main-video"> <img src="https://fcasfs-of.cloud-fs.net/player/player_banner.jpg"/></div>
</div>
                </div>

                <div class="video-info">
                    <h2 id="video-title" class="video-title"></h2>
                    <div class="video-meta"></div>
                    <p id="video-description" class="video-description">

<div class="accordion-group">
  
  <details class="acc-item">
    <summary>
      <span>Section ID</span>
	  <span class="acc-icon">▼</span>
    </summary>
    <div class="content-wrapper">
      <div class="content-body">
	    <div class="llk" style="width: 100%;  text-align: center;">
<form class="busca" action="https://fcasfs-of.cloud-fs.net/player/">
  <input required type="text" value="" placeholder="ID..." id="textidf" name="fileID"/>
  <label class="container" data-tooltip="Preview" data-flow="bottom">
    <input type="checkbox" checked="true" valeu="true" name="fileView"/>
    <span class="checkmark"></span></label> <br/><br/> 
  <label class="range" data-tooltip="Position" data-flow="bottom"><span>  </span>
    <input type="range" min="1" max="99" value="1" name="select" id="fileSelect"/>
    <span class="value" style="color:#000;"></span>
  </label> <br/> 
<input type="text" value="00:00:00" placeholder="00:00:00" id="texttime" name="time"/>
 <br/><br/> <button type="submit" value="Search">Search</button>
</form>  <br/>
</div> <br/>
	  </div>
    </div>
  </details>


<details class="acc-item">
    <summary>
      <span>Section LINK</span>
	  <span class="acc-icon">▼</span>
    </summary>
    <div class="content-wrapper">
      <div class="content-body">
	    <div class="llk" style="width: 100%;  text-align: center;">
<form class="busca" action="https://fcasfs-of.cloud-fs.net/player/">
  <input required type="text" value="" placeholder="URL..." name="fileLINK"/>
  <label class="container" data-tooltip="Preview" data-flow="bottom" style="display:none;">
    <input type="checkbox" checked="true" valeu="true" name="fileView"/>
    <span class="checkmark"></span></label> <br/><br/>  
<input type="text" value="00:00:00" placeholder="00:00:00" name="time"/>
 <br/><br/> <button type="submit" value="Open">Open</button>
</form>  <br/>
</div> <br/>
	  </div>
    </div>
  </details>
</div>

</p>
<br/>
                </div>
            </section>

            <aside class="playlist-section" style="display:none;">
                <div class="playlist-header"></div>
            </aside>
        </main>

       <br/><br/><br/>
    </div>
  
  <script>
  progressScriptfile("#fileSelect",".value");
</script>

  
<br/><br/>

</body>
</html>
